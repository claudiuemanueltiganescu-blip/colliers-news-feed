name: Update RSS feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *" # every hour at :17 UTC

permissions:
  contents: write

env:
  # Opt into Node.js 24 for JS-based actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  # Colliers listing page (the one you used that works)
  COLLIERS_LISTING_URL: "https://www.colliers.com/en/countries/united-states/commercial-real-estate-news"

  # Northmarq "load more" base endpoint (avoids robot-check page)
  NORTHMARQ_LOAD_MORE_BASE: "https://www.northmarq.com/northmarq_load_more/transactions/transactions"

  # Tuning
  NORTHMARQ_PAGES: "3"
  COLLIERS_LIMIT: "80"
  NORTHMARQ_LIMIT: "80"
  TOTAL_LIMIT: "160"

  # Output feed file (published via GitHub Pages /docs)
  FEED_OUT: "docs/colliers-news.xml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build combined RSS (Colliers + Northmarq)
        run: |
          python build_colliers_rss.py \
            --colliers "${COLLIERS_LISTING_URL}" \
            --northmarq_base "${NORTHMARQ_LOAD_MORE_BASE}" \
            --northmarq_pages "${NORTHMARQ_PAGES}" \
            --colliers_limit "${COLLIERS_LIMIT}" \
            --northmarq_limit "${NORTHMARQ_LIMIT}" \
            --total_limit "${TOTAL_LIMIT}" \
            --out "${FEED_OUT}"

          echo "=== docs folder ==="
          ls -lah docs

      - name: Commit & push if changed
        run: |
          if [ ! -f "${FEED_OUT}" ]; then
            echo "ERROR: ${FEED_OUT} was not created."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${FEED_OUT}"

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update RSS feed"
          git push
